global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:3000"]
  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3001"]
  - job_name: core-service
    metrics_path: /metrics
    static_configs:
      - targets: ["core-service:3002"]
  - job_name: clinical-service
    metrics_path: /metrics
    static_configs:
      - targets: ["clinical-service:3003"]
  - job_name: inventory-service
    metrics_path: /metrics
    static_configs:
      - targets: ["inventory-service:3004"]
  - job_name: hr-service
    metrics_path: /metrics
    static_configs:
      - targets: ["hr-service:3005"]
  - job_name: financial-service
    metrics_path: /metrics
    static_configs:
      - targets: ["financial-service:3006"]
  - job_name: assets-service
    metrics_path: /metrics
    static_configs:
      - targets: ["assets-service:3007"]
  - job_name: scheduling-service
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduling-service:3008"]
  - job_name: email-service
    metrics_path: /metrics
    static_configs:
      - targets: ["email-service:3011"]
  - job_name: whatsapp-service
    metrics_path: /metrics
    static_configs:
      - targets: ["whatsapp-service:3012"]
  - job_name: file-service
    metrics_path: /metrics
    static_configs:
      - targets: ["file-service:3013"]
  - job_name: ai-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8000"]
