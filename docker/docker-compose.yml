  email-service:
    build:
      context: ../services/email-service
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3011
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      EMAIL_QUEUE_CONCURRENCY: ${EMAIL_QUEUE_CONCURRENCY:-2}
      EMAIL_QUEUE_MAX_RETRIES: ${EMAIL_QUEUE_MAX_RETRIES:-3}
      EMAIL_QUEUE_RETRY_DELAY_MS: ${EMAIL_QUEUE_RETRY_DELAY_MS:-400}
    env_file:
      - ../config/env/.env.${APP_ENV:-development}
    ports:
      - "3011:3011"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  whatsapp-service:
    build:
      context: ../services/whatsapp-service
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3012
    env_file:
      - ../config/env/.env.${APP_ENV:-development}
    ports:
      - "3012:3012"
    networks:
      - backend

  file-service:
    build:
      context: ../services/file-service
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3013
    env_file:
      - ../config/env/.env.${APP_ENV:-development}
    ports:
      - "3013:3013"
    networks:
      - backend

  ai-service:
    build:
      context: ../ai-service
      dockerfile: ../docker/Dockerfile.ai-service
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    networks:
      - backend

  demo-app:
    build:
      context: ../frontend/demo-app
      dockerfile: ../../docker/Dockerfile.frontend-vite
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000/gateway}
    ports:
      - "4173:4173"
    depends_on:
      - api-gateway
    networks:
      - frontend

  react-app:
    build:
      context: ../frontend/react-app
      dockerfile: ../../docker/Dockerfile.frontend-vite
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000/gateway}
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - frontend

  angular-app:
    build:
      context: ../frontend/angular-app
      dockerfile: ../../docker/Dockerfile.frontend-angular
    environment:
      API_URL: ${API_URL:-http://localhost:3000/gateway}
    ports:
      - "4200:4200"
    depends_on:
      - api-gateway
    networks:
      - frontend

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: saas_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.2.2
    container_name: saas_grafana
    ports:
      - "3009:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - observability

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  observability:
    driver: bridge

volumes:
  postgres_data:
