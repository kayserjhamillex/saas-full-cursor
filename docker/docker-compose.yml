services:
  postgres:
    image: postgres:15
    container_name: saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-saasodontologico}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-saasodontologico}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: saas_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - backend

  api-gateway:
    build:
      context: ../apps/api-gateway
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123}
      DB_NAME: ${POSTGRES_DB:-saasodontologico}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_before_prod}
      JWT_ISSUER: ${JWT_ISSUER:-auth-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-api-gateway}
      ENABLE_TENANT_CACHE: ${ENABLE_TENANT_CACHE:-true}
      TENANT_CACHE_TTL_SECONDS: ${TENANT_CACHE_TTL_SECONDS:-30}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_service_token}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    env_file:
      - ../config/env/.env.${APP_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  auth-service:
    build:
      context: ../apps/auth-service
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123}
      DB_NAME: ${POSTGRES_DB:-saasodontologico}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_before_prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_service_token}
    env_file:
      - ../config/env/.env.${APP_ENV:-development}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  core-service:
    build:
      context: ../apps/core-service
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123}
      DB_NAME: ${POSTGRES_DB:-saasodontologico}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_before_prod}
    env_file:
      - ../config/env/.env.${APP_ENV:-development}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  clinical-service:
    build:
      context: ../apps/clinical-service
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123}
      DB_NAME: ${POSTGRES_DB:-saasodontologico}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_before_prod}
    env_file:
      - ../config/env/.env.${APP_ENV:-development}
    ports:
