  financial-service:
    build:
      context: ../apps/financial-service
      dockerfile: ../../docker/Dockerfile.node-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123}
      DB_NAME: ${POSTGRES_DB:-saasodontologico}
